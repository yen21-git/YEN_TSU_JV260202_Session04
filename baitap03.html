<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Liên hệ với chúng tôi</h1>
    <form>
        <label for="name">Họ và tên:</label><br>
        <input type="text" id="name" name="name" style="width: 24%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" style="width: 24%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br><br>
        <label for="message">Tin nhắn :</label><br>
        <textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>
        <button type="submit" style="color: white; background-color: green ; padding:10px 150px; border: none; border-radius: 5px; cursor: pointer;">Gửi</button>
    </form>
</body>
</html>
